# EDM ZCO - Local Development Configuration
# --------------------------------------------------------
# Lokalny dev: backend + frontend budowane z Dockerfiles
# Połączenie do services na Spark (192.168.1.34)
# --------------------------------------------------------

services:
  # === BACKEND (budowane z Dockerfile, łączy się do Spark PG) ===
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      # Mount source code — zmiany widoczne od razu (uvicorn --reload)
      - ./backend/app:/app/app
    env_file:
      - ./backend/.env.dev
    ports:
      - "8001:8000"

  # === FRONTEND (budowane z Dockerfile, łączy się do local backend) ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      # Hot reload dla Next.js
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.js:/app/next.config.js
      - ./frontend/package.json:/app/package.json
      - ./frontend/.env:/app/.env
    env_file:
      - ./frontend/.env.dev
    depends_on:
      - backend
    ports:
      # Porty 8000, 3000 zajęte — używamy 8001, 3002
      - "3002:3000"


# =====================================================
# Uwagi:
# =====================================================
# 1. Backend łączy się do PostgreSQL na Sparku:
#    - Host: 192.168.1.34
#    - Port: 5433 (mapped from container 5432)
#    - User: postgres / tajne_haslo
#    - DB: edmdatabase
#
# 2. Backend łączy się do Spark services:
#    - n8n: http://192.168.1.34:5678
#    - Qdrant: http://192.168.1.34:6333
#    - Docling: http://127.0.0.1:8002 (docker host)
#    - Ollama: http://192.168.1.34:11434
#
# 3. Frontend łączy się do local backend:
#    - NEXT_PUBLIC_API_URL=http://localhost:8000
#
# 4. Porty lokalne:
#    - Backend:  http://localhost:8000
#    - Frontend: http://localhost:3001 (port 3000 zajęty!)
#
# 5. Start: docker compose -f docker-compose.dev.yaml up -d
#    Dev mode (zmiany widoczne od razu):
#    docker compose -f docker-compose.dev.yaml up backend frontend
#    Stop: docker compose -f docker-compose.dev.yaml down
# =====================================================