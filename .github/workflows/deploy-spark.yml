name: Deploy to Spark

on:
  push:
    branches: [main, spark, master]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND_NAME: ${{ github.repository }}/backend
  IMAGE_FRONTEND_NAME: ${{ github.repository }}/frontend
  SPARK_SSH_HOST: 192.168.1.34
  SPARK_SSH_USER: marcin

jobs:
  # ============================================================
  # TESTY BACKEND
  # ============================================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: pip install --no-cache-dir -r requirements.txt

      - name: Lint with flake8
        working-directory: ./backend
        run: |
          pip install flake8
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Run tests with pytest
        working-directory: ./backend
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing || true
        continue-on-error: true

  # ============================================================
  # BUMP VERSION
  # ============================================================
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Increment patch version
        id: version
        run: |
          VERSION_FILE="VERSION"
          if [ ! -f "$VERSION_FILE" ]; then
            echo "1.0.0" > "$VERSION_FILE"
          fi
          CURRENT=$(cat "$VERSION_FILE" | tr -d '[:space:]')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "$NEW_VERSION" > "$VERSION_FILE"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT -> $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to $(cat VERSION)" || echo "No changes to commit"
          git push || echo "No changes to push"

  # ============================================================
  # BUILD BACKEND IMAGE
  # ============================================================
  build-backend:
    name: Build Backend Image
    needs: [test-backend, bump-version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND_NAME }}
          tags: |
            type=sha,prefix=backend-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # BUILD FRONTEND IMAGE
  # ============================================================
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND_NAME }}
          tags: |
            type=sha,prefix=frontend-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=http://172.17.0.1:8083

  # ============================================================
  # DEPLOY TO SPARK (Self-Hosted Runner)
  # ============================================================
  deploy-spark:
    name: Deploy to Spark DGX
    needs: [build-backend, build-frontend]
    runs-on: self-hosted
    if: github.event_name != 'pull_request'
    environment: spark
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Spark
        run: |
          cd /home/marcin/zco-edm-app
          
          # Create .env file with SHA-tagged images
          cat > .env << EOF
          BUILD_TAG_BACKEND=ghcr.io/marcin-ccc/zco-edm/backend:backend-${{ github.sha }}
          BUILD_TAG_FRONTEND=ghcr.io/marcin-ccc/zco-edm/frontend:frontend-${{ github.sha }}
          EOF
          
          echo "🔨 Pulling SHA-tagged images and deploying..."
          echo "Backend: $(cat .env | grep BUILD_TAG_BACKEND | cut -d= -f2)"
          echo "Frontend: $(cat .env | grep BUILD_TAG_FRONTEND | cut -d= -f2)"
          
          # docker compose automatically loads .env file
          docker compose --profile spark pull
          docker compose --profile spark up -d
          
          echo "✅ Deployment complete!"

      - name: Verify deployment
        run: |
          echo "📋 Checking containers..."
          docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
          
          echo ""
          echo "🏥 Health checks..."
          
          # Backend health check
          curl -sf --max-time 10 http://localhost:8083/api/health && echo ' - Backend OK' || echo ' - Backend FAIL'
          
          # Backend health/info check (new endpoint)
          curl -sf --max-time 10 http://localhost:8083/api/health/info && echo ' - Health Info OK' || echo ' - Health Info FAIL'
          
          # Version check
          curl -sf --max-time 10 http://localhost:8083/api/version && echo ' - Version OK' || echo ' - Version FAIL'
          
          # Frontend health check
          curl -sf --max-time 5 http://localhost:3000 > /dev/null && echo ' - Frontend OK' || echo ' - Frontend FAIL'

      - name: Cleanup old images
        if: always()
        run: |
          docker image prune -f --filter 'until=168h' 2>/dev/null || true

      - name: Notify
        if: always()
        run: |
          echo "📢 Deployment finished!"
          echo "Status: ${{ job.status }}"