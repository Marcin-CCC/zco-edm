# PostgreSQL Client Authentication Configuration File
# All connections use TRUST - no password required for local development

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Local socket connections (docker exec)
local   all             all                                     trust

# IPv4 local connections (127.0.0.1 from Windows host)
host    all             all             127.0.0.1/32            trust

# IPv6 local connections
host    all             all             ::1/128                 trust

# Allow all IPv4 connections (for docker network)
host    all             all             0.0.0.0/0               trust

# Allow all IPv6 connections
host    all             all             ::/0                    trust

# Replication connections
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             ::1/128                 trust